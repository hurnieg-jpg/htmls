<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Intelligence Dashboard</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
.card{background:white;padding:20px;margin:10px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.big{font-size:28px;font-weight:bold}
</style>
</head>
<body>

<h1>AI Contact Intelligence Dashboard</h1>

<div class="card">
<div>Calidad Base</div>
<div class="big" id="quality">-</div>
</div>

<div class="card">
<div>Duplicados Detectados</div>
<div class="big" id="duplicates">-</div>
</div>

<div class="card">
<div>Contactos Enriquecidos</div>
<div class="big" id="enriched">-</div>
</div>

<div class="card">
<div>Confianza Promedio</div>
<div class="big" id="confidence">-</div>
</div>

<script>
window.updateDashboard = function(data){

document.getElementById('quality').innerText = data.quality || '-';
document.getElementById('duplicates').innerText = data.duplicates || '-';
document.getElementById('enriched').innerText = data.enriched || '-';
document.getElementById('confidence').innerText = data.confidence || '-';

}
</script>

</body>
</html>
